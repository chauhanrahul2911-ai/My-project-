<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>GSRTC Conductor MCQ Player</title>
    <style>
        :root { 
            --primary: #0b2545; --success: #22c55e; --error: #ef4444; 
            --dark: #1e293b; --gold: #fbbf24; 
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f1f5f9; display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; }
        
        .quiz-container { background: white; padding: 1.2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; height: auto; align-self: flex-start; margin-top: 5px; position: relative; }
        
        .header { margin-bottom: 8px; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { margin: 0; font-size: 1.1rem; }

        .mute-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 5px; }

        .lifeline-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .lifeline-btn { background: var(--gold); border: none; padding: 6px 14px; border-radius: 20px; font-weight: bold; cursor: pointer; color: #78350f; box-shadow: 0 3px 0 #b45309; font-size: 0.8rem; }
        .lifeline-btn:disabled { background: #e2e8f0; color: #94a3b8; box-shadow: none; cursor: not-allowed; }

        #stats-bar { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; padding: 10px; background: #eff6ff; border-radius: 8px; }
        
        .img-box { width: 100%; height: 140px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #e2e8f0; display: none; background: #fff; cursor: zoom-in; position: relative; overflow: hidden; }
        .img-box img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .zoom-hint { position: absolute; bottom: 5px; right: 5px; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; pointer-events: none; }

        #question { font-weight: 600; margin-bottom: 15px; color: var(--dark); line-height: 1.4; text-align: left; font-size: 1.1rem; }
        
        .options-grid { display: grid; gap: 10px; }
        .option-btn { padding: 12px 15px; border: 1.5px solid #e2e8f0; background: #fff; border-radius: 12px; cursor: pointer; text-align: left; font-weight: 500; font-size: 0.95rem; line-height: 1.3; min-height: 52px; transition: 0.2s; }
        
        .correct { background-color: var(--success) !important; color: white; border-color: var(--success); }
        .wrong { background-color: var(--error) !important; color: white; border-color: var(--error); }
        
        #explain-btn { margin-top: 10px; width: 100%; padding: 10px; background: #f8fafc; color: var(--primary); border: 2px dashed var(--primary); border-radius: 12px; font-weight: bold; display: none; cursor: pointer; font-size: 0.9rem; }
        #next-btn { margin-top: 10px; width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; display: none; cursor: pointer; font-size: 1.1rem; }
        
        .progress { margin-top: 12px; font-size: 0.85rem; color: #64748b; font-weight: bold; }
        .review-label { color: var(--error); font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; display: none; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .explain-content { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; text-align: left; position: relative; max-height: 80vh; overflow-y: auto; }
        .explain-content h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .close-explain { width: 100%; margin-top: 20px; padding: 12px; background: var(--dark); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .secondary-btn { background: var(--dark); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; margin: 10px 5px; width: 85%; cursor: pointer; }
    </style>
</head>
<body>

<audio id="snd-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
<audio id="snd-wrong" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="snd-finish" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<div id="explainModal" class="modal">
    <div class="explain-content">
        <h3>💡 Explanation</h3>
        <p id="explain-text"></p>
        <button class="close-explain" onclick="closeExplain()">Close & Continue</button>
    </div>
</div>

<div id="zoomModal" class="modal">
    <span style="position:absolute; top:20px; right:30px; color:white; font-size:50px; cursor:pointer;" onclick="closeZoom()">×</span>
    <img id="fullImg" onclick="closeZoom()" style="max-width:98%; max-height:90%; object-fit:contain;">
</div>

<div class="quiz-container">
    <div id="review-tag" class="review-label">● REVIEW MODE</div>
    <div class="header">
        <!-- 🎯 Dynamic Header Jo Main Screen Se Topic Name Pick Karega -->
        <h3 id="quiz-title">Loading Quiz...</h3>
        <button id="mute-toggle" class="mute-btn" onclick="toggleMute()">🔊</button>
    </div>
    
    <div id="game-ui">
        <div id="lifeline-area" class="lifeline-bar">
            <button id="fifty-fifty" class="lifeline-btn" onclick="useFiftyFifty()">🎭 50:50 Lifeline</button>
        </div>
        <div id="stats-bar">
            <span id="score-display">Score: 0</span>
            <span id="timer-display">⌛ 10:00</span>
        </div>
        <div class="img-box" id="image-container" onclick="openZoom()">
            <img id="q-image" src="">
            <div class="zoom-hint">🔍 Tap to Zoom</div>
        </div>
        <div id="question">Loading...</div>
        <div class="options-grid" id="options-container">
            <button class="option-btn" onclick="handleChoice(0)"></button>
            <button class="option-btn" onclick="handleChoice(1)"></button>
            <button class="option-btn" onclick="handleChoice(2)"></button>
            <button class="option-btn" onclick="handleChoice(3)"></button>
        </div>
        <button id="explain-btn" onclick="openExplain()">💡 Explain Answer</button>
        <button id="next-btn" onclick="handleNext()">Next Question ➜</button>
        <div id="progress-text" class="progress"></div>
    </div>

    <!-- 🏆 Final Summary UI Screen -->
    <div id="final-ui" style="display:none;">
        <h2 style="color:var(--primary)">Quiz Finished!</h2>
        <div id="final-msg" style="font-weight:bold; margin:10px 0; font-size:1.2rem;"></div>
        <h3 id="final-score" style="color:var(--success)"></h3>
        <button class="secondary-btn" onclick="startReview()">🔍 Review Answers</button>
        <!-- 🎯 Dashboard par bhejne waala real action button -->
        <button class="secondary-btn" style="background:var(--success);" onclick="saveAndGoHome()">📁 Save & Go To Dashboard</button>
    </div>
</div>

<script>
// URL Parameters parsing logic (?subject=...&type=...&no=...)
const urlParams = new URLSearchParams(window.location.search);
const subject = urlParams.get('subject') || "સામાન્ય જ્ઞાન";
const type = urlParams.get('type') || "Quiz";
const quizNo = urlParams.get('no') || "1";

document.getElementById('quiz-title').innerText = `${subject} - ${type} ${quizNo}`;

var quizData = []; // Khaali array jisme dynamic JSON data load hoga
var currentIdx = 0; var score = 0; var answered = false;
var timeLeft = 600; var isReview = false; var userChoices = [];
var isMuted = false; var timerInterval;

// 🌐 Dynamic Fetch Engine: Ek hi template se saare tests fetch karne ke liye
async function loadQuizDataset() {
    try {
        // Aapke GitHub directory folder structure ke mutabiq link:
        // 🎯 Pura Full Address wala Fixed Fetch Code:
// 🎯 QUIZ PLAYER MEIN YE LINE WAPAS DAAL DIJIYE:
const response = await fetch(`data/${subject}/${type}_${quizNo}.json?v=${new Date().getTime()}`);
        if(!response.ok) throw new Error("File not found");
        quizData = await response.json();
        
        // Data aate hi count down aur question load engine active hoga
        startCountdown();
        loadQuestion();
    } catch (err) {
        alert("Quiz data file load nahi ho saki! Path check kijiye.");
        window.location.href = 'index.html';
    }
}

function playSnd(id) { if (isMuted) return; var s = document.getElementById(id); s.currentTime = 0; s.play().catch(e => console.log("Blocked")); }
function toggleMute() { isMuted = !isMuted; document.getElementById('mute-toggle').innerText = isMuted ? "🔇" : "🔊"; }

function startCountdown() {
    timerInterval = setInterval(function() {
        if(isReview) return;
        timeLeft--;
        var mins = Math.floor(timeLeft / 60); var secs = timeLeft % 60;
        document.getElementById('timer-display').innerText = "⌛ " + (mins < 10 ? "0"+mins : mins) + ":" + (secs < 10 ? "0"+secs : secs);
        if (timeLeft <= 0) { clearInterval(timerInterval); showFinalPage(); }
    }, 1000);
}

function loadQuestion() {
    answered = false;
    document.getElementById('next-btn').style.display = isReview ? 'block' : 'none';
    document.getElementById('explain-btn').style.display = 'none';
    document.getElementById('review-tag').style.display = isReview ? 'block' : 'none';
    var lifelineBtn = document.getElementById('fifty-fifty');
    lifelineBtn.disabled = isReview; lifelineBtn.style.display = isReview ? 'none' : 'block';
    document.getElementById('progress-text').innerText = "Question " + (currentIdx + 1) + " of " + quizData.length;
    var data = quizData[currentIdx];
    document.getElementById('question').innerText = data.q;
    
    var imgBox = document.getElementById('image-container');

// 🎯 GitHub Images ke liye aapka sateek modified code:
if (data.img) {
    // Drive link hatakar direct JSON se naya path uthayega
    document.getElementById('q-image').src = data.img; 
    imgBox.style.display = 'block';
} else { 
    imgBox.style.display = 'none'; 
}
    
    var btns = document.querySelectorAll('.option-btn');
    btns.forEach(function(btn, i) {
        btn.textContent = data.options[i];
        btn.className = 'option-btn'; btn.style.visibility = 'visible'; btn.disabled = isReview;
        if(isReview) {
            if(i === data.correct) btn.classList.add('correct');
            if(userChoices[currentIdx] === i && i !== data.correct) btn.classList.add('wrong');
        }
    });
}

function handleChoice(idx) {
    if (answered || isReview) return;
    answered = true; userChoices[currentIdx] = idx;
    var correct = quizData[currentIdx].correct;
    var btns = document.querySelectorAll('.option-btn');
    document.getElementById('fifty-fifty').disabled = true;
    if(idx === correct) { btns[idx].classList.add('correct'); score++; playSnd('snd-correct'); } 
    else { btns[idx].classList.add('wrong'); btns[correct].classList.add('correct'); playSnd('snd-wrong'); }
    document.getElementById('score-display').innerText = "Score: " + score;
    if(quizData[currentIdx].explanation) { document.getElementById('explain-btn').style.display = 'block'; }
    document.getElementById('next-btn').style.display = 'block';
}

function openExplain() {
    playSnd('snd-click');
    var data = quizData[currentIdx];
    document.getElementById('explain-text').innerText = data.explanation || "No explanation available.";
    document.getElementById('explainModal').style.display = 'flex';
}
function closeExplain() { document.getElementById('explainModal').style.display = 'none'; }

function useFiftyFifty() {
    if(answered || isReview) return;
    playSnd('snd-click');
    document.getElementById('fifty-fifty').disabled = true;
    var correct = quizData[currentIdx].correct;
    var btns = document.querySelectorAll('.option-btn');
    var indices = [0, 1, 2, 3].filter(function(i) { return i !== correct; }).sort(function() { return Math.random() - 0.5; });
    btns[indices[0]].style.visibility = 'hidden'; btns[indices[1]].style.visibility = 'hidden';
}

function handleNext() {
    playSnd('snd-click');
    if(isReview && currentIdx === quizData.length - 1) { showFinalPage(); return; }
    currentIdx++;
    if (currentIdx < quizData.length) loadQuestion(); else { clearInterval(timerInterval); showFinalPage(); }
}

function showFinalPage() {
    playSnd('snd-finish');
    document.getElementById('game-ui').style.display = 'none';
    document.getElementById('final-ui').style.display = 'block';
    
    var percent = Math.round((score / quizData.length) * 100);
    var msg = ""; var color = "";
    if(percent === 100) { msg = "🌟 PERFECT! Brilliant Job!"; color = "#22c55e"; }
    else if(percent >= 70) { msg = "👏 Great Job! Almost there!"; color = "#2563eb"; }
    else if(percent >= 40) { msg = "📚 Good effort! Keep practicing!"; color = "#fbbf24"; }
    else { msg = "💪 Don't give up! Try again!"; color = "#ef4444"; }
    
    var msgDiv = document.getElementById('final-msg');
    msgDiv.innerText = msg; msgDiv.style.color = color;
    document.getElementById('final-score').innerText = "Result: " + score + "/" + quizData.length + " (" + percent + "%)";
}

// 🎯 Percentage Progress Tracker Memory Saver
function saveAndGoHome() {
    var finalPercent = Math.round((score / quizData.length) * 100);
    // Unique key generate ki takki dynamic dashboard isko pick kar sake
    let scoreKey = `${subject}_${type}_${quizNo}_score`;
    localStorage.setItem(scoreKey, finalPercent);
    
    // User data save karke smoothly direct main menu dashboard par phek dega
    window.location.href = 'index.html';
}

function startReview() { playSnd('snd-click'); isReview = true; currentIdx = 0; document.getElementById('game-ui').style.display = 'block'; document.getElementById('final-ui').style.display = 'none'; loadQuestion(); }
function openZoom() { playSnd('snd-click'); document.getElementById('fullImg').src = document.getElementById('q-image').src; document.getElementById('zoomModal').style.display = 'flex'; }
function closeZoom() { document.getElementById('zoomModal').style.display = 'none'; }

// Init execute trigger on viewport startup
loadQuizDataset();
</script>
</body>
</html>
